add_managed_device:
  name: Add Managed Device
  description: Add a device IP to the managed devices list to prevent discovery conflicts
  fields:
    ip_address:
      description: IP address of the device to manage
      example: "192.168.1.100"
      required: true

remove_managed_device:
  name: Remove Managed Device
  description: Remove a device IP from the managed devices list
  fields:
    ip_address:
      description: IP address of the device to remove
      example: "192.168.1.100"
      required: true

is_device_managed:
  name: Check Device Managed
  description: Check if a device IP is managed by this component
  fields:
    ip_address:
      description: IP address to check
      example: "192.168.1.100"
      required: true

list_managed_devices:
  name: List Managed Devices
  description: List all devices managed by this component to prevent discovery conflicts. Returns a list of IP addresses.
  fields: {}

test_device_detection:
  name: Test Device Detection
  description: Test if a device would be detected as a cube device based on its properties
  fields:
    device_model:
      description: Device model string (md property)
      example: "cubelite"
      required: false
    device_name:
      description: Device name string (fn property)
      example: "Yeelight Cube Lite"
      required: false
    device_id:
      description: Device ID string (id property)
      example: "0x12345678"
      required: false

ignore_yeelight_discovery:
  name: Ignore Yeelight Discovery
  description: Force ignore a specific IP address from the built-in Yeelight integration
  fields:
    ip_address:
      description: IP address to ignore in Yeelight integration
      example: "192.168.4.139"
      required: true

force_rediscovery:
  name: Force Rediscovery
  description: Clear discovery caches and force rediscovery of a device
  fields:
    ip_address:
      description: IP address to force rediscovery for
      example: "192.168.4.139"
      required: true

trigger_manual_discovery:
  name: Trigger Manual Discovery
  description: Manually trigger discovery for both integrations to test interception
  fields:
    ip_address:
      description: IP address to discover
      example: "192.168.4.139"
      required: true
    device_name:
      description: Device name to use
      example: "CubeLite Test"
      required: false
    device_model:
      description: Device model to use
      example: "cubelite"
      required: false
    device_id:
      description: Device ID to use
      example: "0x12345678"
      required: false

create_cube_discovery:
  name: Create Cube Discovery
  description: Create a discovery flow specifically for the Yeelight Cube Lite component
  fields:
    ip_address:
      description: IP address of your CubeLite device
      example: "192.168.4.139"
      required: true
    device_name:
      description: Friendly name for the device
      example: "My CubeLite"
      required: false

ignore_specific_yeelight:
  name: Ignore Specific Yeelight Device
  description: Ignore only a specific IP address in the Yeelight integration (keeps other devices working)
  fields:
    ip_address:
      description: IP address to ignore in Yeelight integration
      example: "192.168.4.139"
      required: true

load_palette:
  name: Load Palette
  description: Load a palette by index and apply it to the specified entity or all entities
  fields:
    idx:
      description: Index of the palette to load (0-based)
      example: 0
      required: true
      selector:
        number:
          min: 0
          mode: box
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

set_button_effects:
  name: Set physical button effects
  description: Set one to eight ordered native presets cycled by the Cube Lite physical button.
  fields:
    effects:
      description: Ordered native effect or clock style names. The first item is button slot 1.
      required: true
      example: '["Ribbon", "Rainbow", "Clock: Yellow"]'
      selector:
        object:
    entity_id:
      description: Target Yeelight Cube Lite entity.
      required: true
      selector:
        entity:
          domain: light

preview_gradient_modes:
  name: Preview Gradient Modes
  description: Generate full 5x20 preview matrices for all gradient modes using the entity's current text, colors, and angle. Returns previews via event bus.
  fields:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

set_custom_text:
  name: Set Custom Text
  description: Set text to display on the cube matrix. Clears any existing pixel art and resets scroll position.
  fields:
    text:
      description: Text to display on the cube matrix
      example: "HELLO"
      required: true
      selector:
        text:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light

set_text_colors:
  name: Set Text Colors
  description: Set the colors used for text display. Supports gradients with multiple colors.
  fields:
    text_colors:
      description: Array of RGB color arrays, e.g. [[255,0,0], [0,255,0]] for red to green gradient
      example: "[[255, 0, 0], [0, 255, 0], [0, 0, 255]]"
      required: true
      selector:
        object:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_247"
      required: true
      selector:
        entity:
          domain: light
    save_as_palette:
      description: Save these colors as a palette for later use
      example: false
      required: false
      default: false
      selector:
        boolean:

apply_custom_pixels:
  name: Apply Custom Pixels
  description: Apply pixel art to the cube by setting individual pixel colors on the 10x10 matrix.
  fields:
    pixels:
      description: Array of 100 RGB color arrays representing the 10x10 matrix pixels, e.g. [[255,0,0], [0,255,0], ...]
      example: "[[255,0,0], [0,255,0], [0,0,255], ...]"
      required: true
      selector:
        object:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light

send_fx_effect:
  name: "DEBUG: Send FX Effect (raw)"
  description: >-
    LOCAL DEBUG ONLY. Sends a raw private LAN command (default set_fx_effect)
    to the lamp for reverse-engineering. Either provide params (raw JSON array,
    sent verbatim) or the structured fields (mode/style_id/apply/mixer/color/
    data_bytes). Not a stable API.
  fields:
    entity_id:
      description: Target lamp entity ID.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light
    method:
      description: LAN method name.
      example: "set_fx_effect"
      required: false
      default: "set_fx_effect"
      selector:
        text:
    params:
      description: Raw params JSON array (sent verbatim, overrides the structured fields).
      example: '[40, 6, 4, {"mode":40,"mixer":0,"color":[33553920]}]'
      required: false
      selector:
        object:
    mode:
      description: Effect type (40 = clock).
      example: 40
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: box
    style_id:
      description: Style slot ID.
      example: 6
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: box
    apply:
      description: Apply/commit opcode (4 for clock).
      example: 4
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: box
    mixer:
      description: Firmware mixer/animation preset ID.
      example: 39
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: box
    color:
      description: Raw color integer (single int or list of ints).
      example: 33553920
      required: false
      selector:
        object:
    data_bytes:
      description: "Raw data payload as a byte list, e.g. clock: [date(1/2), tz, 12h(0/1), colon(0=blink/1=steady)]."
      example: "[1, 0, 0, 0]"
      required: false
      selector:
        object:
    data:
      description: Base64-encoded data payload (alternative to data_bytes).
      required: false
      selector:
        text:
    close_socket:
      description: Close the fast socket before sending (recommended for fx commands).
      example: true
      required: false
      default: true
      selector:
        boolean:
    persist:
      description: >-
        If true and this is the native clock effect (mode 40) with a known
        style_id (1-14), also update the light's stored clock style so a Force
        Refresh / state update keeps it instead of reverting.
      example: true
      required: false
      default: false
      selector:
        boolean:

query_raw:
  name: "DEBUG: Query Raw (capture reply)"
  description: >-
    LOCAL DEBUG ONLY. Sends a raw command to the lamp and returns the device's
    reply. Useful for probing (e.g. get_prop) and observing responses to
    experimental commands. Not a stable API.
  fields:
    entity_id:
      description: Target lamp entity ID.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light
    method:
      description: LAN method name to send.
      example: "get_prop"
      required: false
      default: "get_prop"
      selector:
        text:
    params:
      description: Params JSON array for the method.
      example: '["power", "bright", "rgb"]'
      required: false
      selector:
        object:

set_mode:
  name: Set Mode
  description: Set the clock, text, gradient, or drawing mode on the cube.
  fields:
    mode:
      description: Clock, text, gradient, or drawing mode
      example: "Angle Gradient"
      required: true
      selector:
        select:
          options:
            - "Clock"
            - "Native Effect"
            - "Solid Color"
            - "Letter Gradient"
            - "Column Gradient"
            - "Row Gradient"
            - "Angle Gradient"
            - "Radial Gradient"
            - "Letter Vertical Gradient"
            - "Letter Angle Gradient"
            - "Text Color Sequence"
            - "Panel Color Sequence"
            - "Custom Draw"
    full_panel:
      description: Whether to apply gradients to entire panel (true) or just text areas (false). If provided, sets both full_panel and mode in one call to avoid redundant updates.
      example: true
      required: false
      selector:
        boolean:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_247"
      required: true
      selector:
        entity:
          domain: light

set_angle:
  name: Set Gradient Angle
  description: Set the gradient angle in degrees for angle-based gradient modes.
  fields:
    angle:
      description: Gradient angle in degrees (0-360). Used for angle-based gradient modes.
      example: 45.0
      required: true
      selector:
        number:
          min: 0
          max: 360
          step: 1
          mode: slider
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light

set_full_panel:
  name: Set Panel Mode
  description: Set whether gradients apply to the entire panel or just text areas.
  fields:
    full_panel:
      description: Whether to apply gradients to entire panel (true) or just text areas (false)
      example: true
      required: true
      selector:
        boolean:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_247"
      required: true
      selector:
        entity:
          domain: light

set_solid_color:
  name: Set Solid Color
  description: Set a single solid RGB color on the lamp (shortcut for Solid Color mode).
  fields:
    rgb_color:
      description: 'RGB color as a list [R, G, B] (0-255 each) or a hex string (e.g. "#FF0000")'
      example: [255, 0, 0]
      required: true
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light

set_brightness:
  name: Set Brightness
  description: Set the lamp brightness using a simple percentage (1-100%). This is a convenience service that wraps the standard light.turn_on brightness control, converting percentage values to Home Assistant's 1-255 brightness range.
  fields:
    brightness:
      description: Brightness percentage (1-100%)
      example: 75
      required: true
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light

# === PIXEL ART MANAGEMENT ===

save_pixel_art:
  name: Save Pixel Art
  description: Save current drawing as a named pixel art for later reuse.
  fields:
    pixels:
      description: Array of pixel objects with position and color
      example: '[{"position": 0, "color": [255, 0, 0]}, {"position": 1, "color": [0, 255, 0]}]'
      required: true
      selector:
        object:
    name:
      description: Name for the saved pixel art
      example: "My Drawing"
      required: false
      selector:
        text:

apply_pixel_art:
  name: Apply Pixel Art
  description: Apply a saved pixel art by index to the cube.
  fields:
    idx:
      description: Index of the saved pixel art to apply (0-based)
      example: 0
      required: true
      selector:
        number:
          min: 0
          mode: box
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      required: true
      selector:
        entity:
          domain: light

remove_pixel_art:
  name: Remove Pixel Art
  description: Remove a saved pixel art by index.
  fields:
    idx:
      description: Index of the pixel art to remove (0-based)
      example: 0
      required: true
      selector:
        number:
          min: 0
          mode: box

rename_pixel_art:
  name: Rename Pixel Art
  description: Rename a saved pixel art.
  fields:
    idx:
      description: Index of the pixel art to rename (0-based)
      example: 0
      required: true
      selector:
        number:
          min: 0
          mode: box
    name:
      description: New name for the pixel art
      example: "Updated Drawing"
      required: true
      selector:
        text:

get_pixel_art:
  name: Get Pixel Art
  description: Retrieve a saved pixel art by index.
  fields:
    idx:
      description: Index of the pixel art to retrieve (0-based)
      example: 0
      required: true
      default: 0
      selector:
        number:
          min: 0
          mode: box
    group_by_color:
      description: "When true, returns the internal grouped format directly — each entry has a color and a position list instead of one entry per pixel. Default (false) expands to flat [{position, color}] format compatible with save_pixel_art."
      example: true
      required: false
      default: false
      selector:
        boolean:

update_pixel_arts:
  name: Update Pixel Arts
  description: Append or replace the pixel art collection. Default is non-destructive (appends to existing).
  fields:
    pixel_arts:
      description: Array of pixel art objects with name and pixels
      example: '[{"name": "Art1", "pixels": [[255,0,0], [0,255,0], ...]}, {"name": "Art2", "pixels": [...]}]'
      required: true
      selector:
        object:
    replace:
      description: "If true, fully replaces the existing collection. If false (default), appends the provided arts to the existing collection."
      example: false
      required: false
      default: false
      selector:
        boolean:

# === PALETTE MANAGEMENT ===

save_palette:
  name: Save Palette
  description: Save a color palette for later use in gradients and text coloring.
  fields:
    palette:
      description: Array of RGB color arrays
      example: "[[255, 0, 0], [0, 255, 0], [0, 0, 255]]"
      required: true
      selector:
        object:
    name:
      description: Name for the saved palette
      example: "Rainbow Colors"
      required: false
      selector:
        text:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.cubelite_192_168_4_139"
      required: true
      selector:
        entity:
          domain: light

remove_palette:
  name: Remove Palette
  description: Remove a saved palette by index.
  fields:
    idx:
      description: Index of the palette to remove (0-based)
      example: 0
      required: true
      selector:
        number:
          min: 0
          mode: box

rename_palette:
  name: Rename Palette
  description: Rename a saved palette.
  fields:
    idx:
      description: Index of the palette to rename (0-based)
      example: 0
      required: true
      selector:
        number:
          min: 0
          mode: box
    name:
      description: New name for the palette
      example: "Updated Palette"
      required: true
      selector:
        text:

set_palettes:
  name: Set Palettes
  description: Replace all palettes with a new set of palettes.
  fields:
    palettes:
      description: Array of palette objects with name and colors
      example: '[{"name": "Palette1", "colors": [[255,0,0], [0,255,0]]}, {"name": "Palette2", "colors": [[0,0,255], [255,255,0]]}]'
      required: true
      selector:
        object:

# === DISPLAY SETTINGS ===

set_orientation:
  name: Set Orientation
  description: Set the display orientation of the cube matrix.
  fields:
    orientation:
      description: Display orientation
      example: "normal"
      required: true
      selector:
        select:
          options:
            - "normal"
            - "flipped"
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      required: true
      selector:
        entity:
          domain: light

set_device_orientation:
  name: Set Device Orientation
  description: >-
    Set the physical device orientation (which way the cube is mounted).
    Applies immediately to the current mode: matrix/text/pixel art flip
    (right/up upright, left/down 180 deg), and native effects follow the
    matching flow direction. The 90 deg visual rotation for up/down is shown
    in the lamp preview card.
  fields:
    orientation:
      description: Physical mount orientation
      example: "right"
      required: true
      selector:
        select:
          options:
            - "right"
            - "down"
            - "left"
            - "up"
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      required: true
      selector:
        entity:
          domain: light

set_font:
  name: Set Font
  description: Set the font used for text display.
  fields:
    font:
      description: Font name to use for text display
      example: "basic"
      required: true
      selector:
        select:
          options:
            - "basic"
            - "koubit"
            - "josefin"
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      required: true
      selector:
        entity:
          domain: light

set_alignment:
  name: Set Text Alignment
  description: Set the text alignment for displayed text.
  fields:
    alignment:
      description: Text alignment
      example: "center"
      required: true
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      required: true
      selector:
        entity:
          domain: light

# === IMAGE DISPLAY ===

display_image:
  name: Display Image
  description: Display a base64-encoded image on the cube matrix (resized to 20x5).
  fields:
    image_b64:
      description: Base64-encoded image data
      example: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
      required: true
      selector:
        text:
          multiline: true
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      required: true
      selector:
        entity:
          domain: light

# === TESTING AND DEBUGGING ===

test_display:
  name: Test Display
  description: Test service to manually trigger display mode application for debugging.
  fields: {}

set_preview_adjustments:
  name: Set Color Effects
  description: Apply real-time color effects to the lamp output. Note - Use the light brightness control for overall brightness adjustment.
  fields:
    # === COLOR ADJUSTMENTS ===
    hue_shift:
      description: "[Color] Hue Shift - rotate colors through the spectrum (-180 to +180°). 0=no change"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: -180
          max: 180
          mode: slider
    temperature:
      description: "[Color] Temperature - color warmth (-100 to +100). Negative=cool/blue, Positive=warm/orange"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: -100
          max: 100
          mode: slider
    # === SATURATION & INTENSITY ===
    saturation:
      description: "[Intensity] Saturation - color richness (0-200). 0=grayscale, 100=normal, 200=hyper-saturated"
      example: 100
      required: false
      default: 100
      selector:
        number:
          min: 0
          max: 200
          mode: slider
    vibrance:
      description: "[Intensity] Vibrance - smart saturation (0-200). Like saturation but protects already-saturated colors"
      example: 100
      required: false
      default: 100
      selector:
        number:
          min: 0
          max: 200
          mode: slider
    # === TONE & CONTRAST ===
    contrast:
      description: "[Tone] Contrast - separation between light and dark (0-200). 0=flat gray, 100=normal, 200=high contrast"
      example: 100
      required: false
      default: 100
      selector:
        number:
          min: 0
          max: 200
          mode: slider
    glow:
      description: "[Tone] Glow - boost bright pixels (0-100). Creates a luminous glowing effect on highlights"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    # === SPECIAL EFFECTS ===
    grayscale:
      description: "[Effect] Grayscale - convert to black & white (0-100). 0=full color, 100=monochrome"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    invert:
      description: "[Effect] Invert - negative/inverse colors (0-100). 0=normal, 100=fully inverted"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    tint_hue:
      description: "[Effect] Tint Color - hue for color overlay (0-360°). 0=red, 120=green, 240=blue. Requires tint_strength"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 360
          mode: slider
    tint_strength:
      description: "[Effect] Tint Strength - intensity of color tint (0-100). Use with tint_hue"
      example: 0
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

force_refresh:
  name: Force Refresh
  description: >
    Force refresh using raw TCP connections (bypasses the persistent socket).
    Opens a fresh TCP connection for each command, exactly like the working
    yeelight_matrix library script. Use this when the lamp is stuck and
    normal display updates are not reaching it.
  fields:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

save_state:
  name: Save State
  description: >
    Snapshot the lamp's current display state (text, colors, gradient mode,
    angle, drawing/pixel art, font, alignment, orientation, brightness and all
    colour effects). Only one snapshot is kept per lamp; calling again
    overwrites it. Pair with restore_state to show something temporarily and
    then return to what was displayed before. Note: the snapshot is held in
    memory and does not survive a Home Assistant restart.
  fields:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

restore_state:
  name: Restore State
  description: >
    Restore the display state previously captured with save_state and
    re-render it on the lamp. Does nothing if no state was saved.
  fields:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

set_color_accuracy:
  name: Set Color Accuracy
  description: >
    Toggle hardware colour accuracy correction.  Applies per-channel gain to
    compensate for LED colour rendering differences vs. a computer monitor.
    Reduces green and blue channels slightly so yellows, cyans, and whites
    look neutral rather than greenish, and blues/purples appear deeper instead
    of washed out.  The preview card is NOT affected.
  fields:
    enabled:
      description: Enable or disable colour accuracy correction.
      example: true
      required: true
      selector:
        boolean:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

set_calibration_lock:
  name: Set Calibration Lock (Internal)
  description: >
    Take or release exclusive control of the lamp for the calibration wizard.
    While locked, the lamp ignores display, brightness, and turn on/off commands
    coming from automations or other cards, so the wizard's test patterns are not
    disturbed mid-session.  The lock auto-releases after 15 minutes of inactivity
    as a safety net.  Used internally by the calibration card.
  fields:
    enabled:
      description: Enable (take control) or disable (release control) the lock.
      example: true
      required: true
      selector:
        boolean:
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102).
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light

set_color_calibration:
  name: Set Color Calibration (Debug)
  description: >
    Adjust color correction and accuracy calibration values at runtime.
    All fields are optional — only provided values are updated.
    Changes are NOT persisted across restarts (set new defaults in code).
  fields:
    gamma_r:
      description: "System 1 — Red inverse gamma (0.1–1.0, lower = more boost). Default: 0.85"
      example: 0.85
      required: false
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.01
          mode: slider
    gamma_g:
      description: "System 1 — Green inverse gamma. Default: 0.75"
      example: 0.75
      required: false
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.01
          mode: slider
    gamma_b:
      description: "System 1 — Blue inverse gamma. Default: 0.62"
      example: 0.62
      required: false
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.01
          mode: slider
    hw_threshold:
      description: "System 1 — HW brightness % above which gamma correction is OFF. Default: 50"
      example: 50
      required: false
      selector:
        number:
          min: 10
          max: 100
          step: 1
          mode: slider
    hw_full:
      description: "System 1 — HW brightness % at/below which gamma correction is 100%. Default: 10"
      example: 10
      required: false
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: slider
    gain_r:
      description: "System 2 — Red channel gain multiplier (0.5–1.5). Default: 1.00"
      example: 1.00
      required: false
      selector:
        number:
          min: 0.5
          max: 1.5
          step: 0.01
          mode: slider
    gain_g:
      description: "System 2 — Green channel gain multiplier. Default: 1.00"
      example: 1.00
      required: false
      selector:
        number:
          min: 0.5
          max: 1.5
          step: 0.01
          mode: slider
    gain_b:
      description: "System 2 — Blue channel gain multiplier. Default: 1.00"
      example: 1.00
      required: false
      selector:
        number:
          min: 0.5
          max: 1.5
          step: 0.01
          mode: slider
    hw_floor:
      description: "System 3 — Hardware brightness % at 0% user brightness (sets dimmest LED drive). Default: 1"
      example: 1
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
    darken_floor:
      description: "System 3 — RGB darkening % at 0% user brightness (sets dimmest per-pixel math). Default: 97"
      example: 97
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: slider
    hw_curve:
      description: "System 3 — Hardware curve exponent. <1 rises fast then flattens near 100%. Default: 0.5"
      example: 0.5
      required: false
      selector:
        number:
          min: 0.1
          max: 3.0
          step: 0.05
          mode: slider
    darken_curve:
      description: "System 3 — Darken curve exponent. >1 keeps colors rich until you dim well down. Default: 2.0"
      example: 2.0
      required: false
      selector:
        number:
          min: 0.1
          max: 4.0
          step: 0.05
          mode: slider
    channel_balance:
      description: "System 1 — Blend between uniform (0=hue-safe) and per-channel (1=blue fix) correction. Default: 0.7"
      example: 0.7
      required: false
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider
    floor_r:
      description: "Per-channel minimum lit value for red (lowest value the red LED renders cleanly). Default: 1"
      example: 1
      required: false
      selector:
        number:
          min: 1
          max: 32
          step: 1
          mode: slider
    floor_g:
      description: "Per-channel minimum lit value for green. Default: 1"
      example: 1
      required: false
      selector:
        number:
          min: 1
          max: 32
          step: 1
          mode: slider
    floor_b:
      description: "Per-channel minimum lit value for blue (blue LEDs often need a higher floor). Default: 1"
      example: 1
      required: false
      selector:
        number:
          min: 1
          max: 32
          step: 1
          mode: slider
    entity_id:
      description: Target lamp entity ID (e.g. light.cubelite_192_168_4_102). Must be provided for direct service calls.
      example: "light.yeelight_cube_192_168_1_100"
      required: true
      selector:
        entity:
          domain: light
